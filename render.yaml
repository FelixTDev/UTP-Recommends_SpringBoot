services:
  - type: web
    name: utp-recommends-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/public/carreras/activas
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_SECURITY_JWT_SECRET
        sync: false
      - key: APP_SECURITY_JWT_EXPIRATION_MINUTES
        value: "30"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_ENABLED
        value: "false"
