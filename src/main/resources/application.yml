spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/utp_recommends}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:replace_with_a_256_bit_secret_replace_with_a_256_bit_secret}
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:30}
